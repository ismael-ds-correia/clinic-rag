services:
  ambient-llm:
    container_name: ambient-llm
    build:
      context: ../
      dockerfile: docker/Dockerfile
    
    ports:
      - "8501:8501"
    
    volumes:
      - ../academic:/app/academic
    
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, compute, utility]
    tty: true
    stdin_open: true